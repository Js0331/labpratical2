name: fair_tracker
description: A Flutter application for tracking student participation in education fairs with location-based verification.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI and Navigation
  cupertino_icons: ^1.0.2

  # Location and Geocoding
  geolocator: ^9.0.2
  geocoding: ^2.1.0

  # Maps
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # State Management
  provider: ^6.0.0

  # Utilities
  google_maps_flutter: ^2.2.5

  # Storage
  shared_preferences: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
